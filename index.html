<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Compare — Best Price, Instantly</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: #0f0f13; }

    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
    }
    .glass-light {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .gradient-text {
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .search-glow:focus-within {
      box-shadow: 0 0 0 2px rgba(139,92,246,0.4), 0 20px 60px rgba(139,92,246,0.15);
    }
    .card-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }

    .suggest-item:hover { background: rgba(139,92,246,0.15); }
    .platform-blinkit { border-top: 3px solid #f8c31e; }
    .platform-zepto   { border-top: 3px solid #8b5cf6; }

    .badge-cheapest {
      background: linear-gradient(135deg, #059669, #10b981);
      box-shadow: 0 2px 8px rgba(16,185,129,0.4);
    }
    .pulse-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Cart drawer */
    .cart-drawer {
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .cart-drawer.open {
      transform: translateX(0);
    }
    .cart-overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .cart-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body class="min-h-screen text-white">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = '';  // same origin

const PLATFORMS = {
  blinkit: { label: 'Blinkit', color: '#f8c31e', bg: 'rgba(248,195,30,0.1)', logo: '🟡' },
  zepto:   { label: 'Zepto',   color: '#8b5cf6', bg: 'rgba(139,92,246,0.1)', logo: '🟣' },
};

const ACTIVE_PLATFORMS = ['blinkit', 'zepto'];

/* ── Skeleton ── */
function Skeleton({ className = '' }) {
  return <div className={`shimmer rounded-lg ${className}`} />;
}

/* ── Cart Drawer ── */
function CartDrawer({ cart, onRemove, onClear, onClose, isOpen }) {
  const totals = {};
  ACTIVE_PLATFORMS.forEach(p => {
    totals[p] = cart.reduce((sum, e) => {
      const item = e[p];
      return item && item.in_stock ? sum + item.price : sum;
    }, 0);
  });

  const availablePlatforms = ACTIVE_PLATFORMS.filter(p => totals[p] > 0);
  const cheapestPlatform = availablePlatforms.length > 0
    ? availablePlatforms.reduce((a, b) => totals[a] <= totals[b] ? a : b)
    : null;

  const savings = availablePlatforms.length === 2
    ? Math.abs(totals.blinkit - totals.zepto)
    : 0;

  return (
    <>
      {/* Overlay */}
      <div
        className={`cart-overlay fixed inset-0 bg-black/60 z-40 ${isOpen ? 'open' : ''}`}
        onClick={onClose}
      />

      {/* Drawer */}
      <div className={`cart-drawer fixed right-0 top-0 h-full w-80 z-50 flex flex-col`}
           style={{ background: 'rgba(15,15,19,0.97)', borderLeft: '1px solid rgba(255,255,255,0.08)', backdropFilter: 'blur(20px)' }}
           data-open={isOpen ? 'true' : 'false'}
           ref={el => {
             if (el) {
               if (isOpen) el.classList.add('open');
               else el.classList.remove('open');
             }
           }}>

        {/* Header */}
        <div className="px-4 py-4 border-b border-white/8 flex items-center justify-between flex-shrink-0">
          <div className="flex items-center gap-2">
            <span className="text-lg">🛒</span>
            <span className="font-bold text-white">Basket</span>
            {cart.length > 0 && (
              <span className="text-xs bg-violet-500/20 text-violet-300 px-2 py-0.5 rounded-full font-medium">
                {cart.length} {cart.length === 1 ? 'item' : 'items'}
              </span>
            )}
          </div>
          <div className="flex items-center gap-2">
            {cart.length > 0 && (
              <button onClick={onClear} className="text-xs text-white/25 hover:text-red-400/70 transition-colors">
                Clear all
              </button>
            )}
            <button onClick={onClose} className="w-7 h-7 rounded-lg glass-light flex items-center justify-center text-white/40 hover:text-white transition-colors">
              ✕
            </button>
          </div>
        </div>

        {cart.length === 0 ? (
          <div className="flex-1 flex flex-col items-center justify-center gap-3 px-6 text-center">
            <div className="text-4xl opacity-20">🛒</div>
            <p className="text-white/25 text-sm">Your basket is empty.</p>
            <p className="text-white/15 text-xs">Click the + on any product to add it here and compare your total across platforms.</p>
          </div>
        ) : (
          <>
            {/* Column headers */}
            <div className="px-4 pt-3 pb-1 flex-shrink-0">
              <div className="grid items-center gap-1" style={{ gridTemplateColumns: '1fr 52px 52px 24px' }}>
                <span className="text-[10px] text-white/25 uppercase tracking-widest">Product</span>
                <span className="text-[10px] text-yellow-400/80 uppercase tracking-widest text-center">BL</span>
                <span className="text-[10px] text-violet-400/80 uppercase tracking-widest text-center">ZP</span>
                <span />
              </div>
            </div>

            {/* Cart items */}
            <div className="flex-1 overflow-y-auto px-3 py-1 space-y-1.5">
              {cart.map(entry => (
                <div key={entry.id} className="glass-light rounded-xl px-3 py-2.5">
                  <div className="grid items-center gap-1" style={{ gridTemplateColumns: '1fr 52px 52px 24px' }}>
                    <div className="min-w-0">
                      <p className="text-xs text-white/85 font-medium truncate">{entry.query}</p>
                      {(entry.blinkit || entry.zepto) && (
                        <div className="text-[10px] text-white/30 mt-0.5 space-y-0.5">
                          {entry.blinkit && (
                            <p className="truncate" title={entry.blinkit.name}>BL: {entry.blinkit.name}</p>
                          )}
                          {entry.zepto && (
                            <p className="truncate" title={entry.zepto.name}>ZP: {entry.zepto.name}</p>
                          )}
                        </div>
                      )}
                    </div>

                    {/* Blinkit price */}
                    <div className="text-center">
                      {entry.blinkit ? (
                        <span className={`text-xs font-bold ${entry.blinkit.in_stock ? 'text-yellow-300' : 'text-red-400/50 line-through'}`}>
                          ₹{entry.blinkit.price}
                        </span>
                      ) : (
                        <span className="text-white/20 text-xs">—</span>
                      )}
                    </div>

                    {/* Zepto price */}
                    <div className="text-center">
                      {entry.zepto ? (
                        <span className={`text-xs font-bold ${entry.zepto.in_stock ? 'text-violet-300' : 'text-red-400/50 line-through'}`}>
                          ₹{entry.zepto.price}
                        </span>
                      ) : (
                        <span className="text-white/20 text-xs">—</span>
                      )}
                    </div>

                    {/* Remove */}
                    <button
                      onClick={() => onRemove(entry.id)}
                      className="w-5 h-5 rounded-md flex items-center justify-center text-white/20 hover:text-red-400/80 hover:bg-red-400/10 transition-all text-xs"
                      title="Remove"
                    >
                      ✕
                    </button>
                  </div>
                </div>
              ))}
            </div>

            {/* Totals */}
            <div className="px-4 py-4 border-t border-white/8 space-y-3 flex-shrink-0">
              <div className="grid grid-cols-2 gap-2">
                {ACTIVE_PLATFORMS.map(p => {
                  const meta = PLATFORMS[p];
                  const isCheapest = p === cheapestPlatform;
                  return (
                    <div key={p} className={`rounded-xl p-3 ${isCheapest ? 'ring-1 ring-emerald-500/40' : ''}`}
                         style={{ background: meta.bg, border: `1px solid ${meta.color}22` }}>
                      <div className="text-[10px] font-semibold mb-1" style={{ color: meta.color }}>
                        {meta.label}
                      </div>
                      <div className={`text-xl font-extrabold ${isCheapest ? 'text-emerald-400' : 'text-white'}`}>
                        ₹{totals[p].toFixed(0)}
                      </div>
                      {isCheapest && savings > 0 && (
                        <div className="text-[10px] text-emerald-400/70 mt-0.5">
                          Save ₹{savings.toFixed(0)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {cheapestPlatform ? (
                <div
                  className="rounded-xl px-4 py-3 text-center"
                  style={{ background: 'rgba(16,185,129,0.08)', border: '1px solid rgba(16,185,129,0.18)' }}
                >
                  <div className="text-[10px] uppercase tracking-widest text-emerald-400/70 mb-1">
                    Lowest basket total
                  </div>
                  <div className="text-sm font-semibold text-white">
                    {PLATFORMS[cheapestPlatform].label} at ₹{totals[cheapestPlatform].toFixed(0)}
                  </div>
                  {savings > 0 && (
                    <div className="text-[11px] text-emerald-400/80 mt-1">
                      You save ₹{savings.toFixed(0)} compared with the other app
                    </div>
                  )}
                </div>
              ) : (
                <p className="text-[10px] text-white/20 text-center leading-relaxed">
                  Add items to your basket to compare the total cost across apps.
                </p>
              )}
            </div>
          </>
        )}
      </div>
    </>
  );
}

/* ── Product Card ── */
function ProductCard({ product, isCheapest, onAddToCart, isSelectedInBasket }) {
  const canAdd = product.in_stock && onAddToCart;
  const addThis = () => {
    if (!canAdd || isSelectedInBasket) return;
    onAddToCart(product);
  };

  const interactiveMain = canAdd && !isSelectedInBasket && product.in_stock;

  return (
    <div
      className={`glass-light rounded-xl p-3 card-hover relative ${isCheapest ? 'ring-1 ring-emerald-500/40' : ''} ${!product.in_stock ? 'opacity-60' : ''}`}
    >
      {isCheapest && (
        <span className="badge-cheapest absolute -top-2 -right-2 text-white text-[10px] font-bold px-2 py-0.5 rounded-full z-10">
          CHEAPEST
        </span>
      )}
      {/* Main body: tap to add (same as +) */}
      <div
        role="button"
        tabIndex={interactiveMain ? 0 : -1}
        onClick={addThis}
        onKeyDown={e => { if (interactiveMain && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); addThis(); } }}
        className={`flex gap-3 items-start text-left w-full ${interactiveMain ? 'cursor-pointer' : 'cursor-default'} ${!product.in_stock ? 'cursor-not-allowed' : ''}`}
        title={!product.in_stock ? 'Out of stock' : isSelectedInBasket ? 'In your basket' : 'Tap to add this item to your basket'}
      >
        {product.image_url ? (
          <img
            src={product.image_url}
            alt=""
            className="w-14 h-14 object-contain rounded-lg bg-white/5 flex-shrink-0 pointer-events-none"
            onError={e => { e.target.style.display = 'none'; }}
          />
        ) : (
          <div className="w-14 h-14 rounded-lg bg-white/5 flex-shrink-0 flex items-center justify-center text-2xl pointer-events-none">🛒</div>
        )}
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold text-white leading-tight line-clamp-2">{product.name}</p>
          <p className="text-xs text-white/40 mt-0.5">{product.quantity}</p>
          <div className="flex items-center gap-2 mt-1.5 flex-wrap">
            <span className="text-base font-bold text-white">₹{product.price}</span>
            {product.mrp && product.mrp > product.price && (
              <span className="text-xs text-white/30 line-through">₹{product.mrp}</span>
            )}
            {product.discount_percent && (
              <span className="text-xs font-semibold text-emerald-400">{product.discount_percent}% off</span>
            )}
          </div>
          {!product.in_stock && (
            <span className="text-xs text-red-400 mt-1 inline-block">Out of stock</span>
          )}
        </div>
      </div>

      {/* Actions: fixed row so + never overlaps "View on site" */}
      <div className="flex items-center justify-between gap-3 mt-3 pt-2.5 border-t border-white/10">
        {product.url ? (
          <button
            type="button"
            onClick={() => window.open(product.url, '_blank', 'noopener,noreferrer')}
            className="text-[10px] sm:text-xs text-violet-400/90 hover:text-violet-300 text-left min-w-0 flex-1 py-1.5 rounded-lg hover:bg-white/5 transition-colors"
          >
            View on site ↗
          </button>
        ) : (
          <span className="text-[10px] text-white/25 flex-1">—</span>
        )}
        <button
          type="button"
          onClick={addThis}
          className={`flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center text-base font-bold transition-all ${
            isSelectedInBasket
              ? 'bg-emerald-500/25 text-emerald-400 ring-1 ring-emerald-500/40'
              : 'bg-white/10 hover:bg-violet-500/35 text-white/90 hover:text-white'
          } ${!canAdd ? 'opacity-40 cursor-not-allowed' : ''}`}
          disabled={!canAdd || isSelectedInBasket}
          aria-label={isSelectedInBasket ? 'In basket' : 'Add to basket'}
          title={isSelectedInBasket ? 'In your basket' : 'Add to basket'}
        >
          {isSelectedInBasket ? '✓' : '+'}
        </button>
      </div>
    </div>
  );
}

function productMatches(a, b) {
  if (!a || !b) return false;
  return a.platform === b.platform && a.name === b.name && Number(a.price) === Number(b.price);
}

/* ── Platform Column ── */
function PlatformColumn({ platform, result, cheapestProduct, loading, onAddToCart, selectedProductOnPlatform }) {
  const meta = PLATFORMS[platform];

  return (
    <div className={`glass rounded-2xl overflow-hidden platform-${platform}`} style={{ borderTopColor: meta.color }}>
      {/* header */}
      <div className="px-4 py-3 flex items-center justify-between" style={{ background: meta.bg }}>
        <div className="flex items-center gap-2">
          <span className="text-lg">{meta.logo}</span>
          <span className="font-bold text-white">{meta.label}</span>
          {result?.status === 'cached' && (
            <span className="text-[10px] text-white/30 bg-white/5 px-1.5 py-0.5 rounded-full">cached</span>
          )}
        </div>
        {result && !loading && (
          <div className="text-right">
            {result.status === 'error' ? (
              <span className="text-xs text-red-400">unavailable</span>
            ) : (
              <span className="text-xs text-white/40">{result.products.length} results</span>
            )}
          </div>
        )}
      </div>

      {/* body */}
      <div className="p-3 space-y-2 max-h-[600px] overflow-y-auto">
        {loading ? (
          Array.from({ length: 3 }).map((_, i) => (
            <div key={i} className="glass-light rounded-xl p-3 flex gap-3">
              <Skeleton className="w-14 h-14 flex-shrink-0" />
              <div className="flex-1 space-y-2">
                <Skeleton className="h-3 w-3/4" />
                <Skeleton className="h-2 w-1/2" />
                <Skeleton className="h-4 w-1/3" />
              </div>
            </div>
          ))
        ) : result?.status === 'error' ? (
          <div className="text-center py-8">
            <div className="text-3xl mb-2">⚠️</div>
            <p className="text-xs text-white/30 leading-relaxed px-2">{result.error?.split('.')[0]}.</p>
          </div>
        ) : result?.products.length === 0 ? (
          <div className="text-center py-8">
            <div className="text-3xl mb-2">🔍</div>
            <p className="text-xs text-white/30">No results found</p>
          </div>
        ) : (
          result.products.map((p, i) => (
            <ProductCard
              key={i}
              product={p}
              isCheapest={cheapestProduct && p.name === cheapestProduct.name && p.platform === cheapestProduct.platform && p.price === cheapestProduct.price}
              onAddToCart={onAddToCart}
              isSelectedInBasket={productMatches(selectedProductOnPlatform, p)}
            />
          ))
        )}
      </div>
    </div>
  );
}

/* ── Summary Bar ── */
function SummaryBar({ results, cheapest, summary, onAddAll, currentQueryInCart }) {
  if (!results) return null;

  const hasResults = Object.values(results).some(r => r.products?.length > 0);

  return (
    <div className="glass rounded-2xl px-6 py-4 flex flex-wrap items-center justify-between gap-4">
      <div className="flex flex-wrap gap-4">
        {Object.entries(summary).map(([platform, price]) => {
          const meta = PLATFORMS[platform];
          const isBest = cheapest?.platform === platform;
          return (
            <div key={platform} className="flex items-center gap-2">
              <span style={{ color: meta.color }} className="font-semibold text-sm">{meta.label}</span>
              {price != null ? (
                <span className={`text-sm font-bold ${isBest ? 'text-emerald-400' : 'text-white'}`}>
                  ₹{price}
                  {isBest && <span className="ml-1 text-[10px] bg-emerald-500/20 text-emerald-400 px-1.5 py-0.5 rounded-full">BEST</span>}
                </span>
              ) : (
                <span className="text-xs text-white/30">—</span>
              )}
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-3">
        {cheapest && (
          <div className="text-xs text-white/40">
            Save up to{' '}
            <span className="text-emerald-400 font-semibold">
              ₹{Math.max(...Object.values(summary).filter(Boolean)) - cheapest.price}
            </span>
            {' '}vs others
          </div>
        )}
        {hasResults && (
          <button
            onClick={onAddAll}
            disabled={currentQueryInCart}
            className={`flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-xl transition-all ${
              currentQueryInCart
                ? 'bg-emerald-500/15 text-emerald-400 cursor-default'
                : 'bg-violet-600 hover:bg-violet-500 text-white'
            }`}
          >
            {currentQueryInCart ? '✓ In Basket' : '+ Add to Compare Basket'}
          </button>
        )}
      </div>
    </div>
  );
}

/* ── Search Bar ── */
function SearchBar({ onSearch, loading }) {
  const [query, setQuery] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [selectedIdx, setSelectedIdx] = useState(-1);
  const debounceRef = useRef(null);
  const inputRef = useRef(null);

  const fetchSuggestions = useCallback(async (q) => {
    if (q.length < 2) { setSuggestions([]); return; }
    try {
      const res = await fetch(`${API}/suggest?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      setSuggestions(data.suggestions || []);
    } catch { setSuggestions([]); }
  }, []);

  const handleChange = (e) => {
    const val = e.target.value;
    setQuery(val);
    setSelectedIdx(-1);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => fetchSuggestions(val), 250);
    setShowSuggestions(true);
  };

  const handleSelect = (name) => {
    setQuery(name);
    setSuggestions([]);
    setShowSuggestions(false);
    onSearch(name);
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!query.trim()) return;
    setSuggestions([]);
    setShowSuggestions(false);
    onSearch(query.trim());
  };

  const handleKeyDown = (e) => {
    if (!showSuggestions || suggestions.length === 0) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedIdx(i => Math.min(i + 1, suggestions.length - 1)); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setSelectedIdx(i => Math.max(i - 1, -1)); }
    if (e.key === 'Enter' && selectedIdx >= 0) { e.preventDefault(); handleSelect(suggestions[selectedIdx]); }
    if (e.key === 'Escape') { setShowSuggestions(false); }
  };

  return (
    <form onSubmit={handleSubmit} className="relative w-full max-w-2xl mx-auto">
      <div className="search-glow glass rounded-2xl flex items-center gap-3 px-5 py-4 transition-all duration-300">
        <svg className="w-5 h-5 text-white/30 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input
          ref={inputRef}
          type="text"
          value={query}
          onChange={handleChange}
          onKeyDown={handleKeyDown}
          onFocus={() => query.length >= 2 && setShowSuggestions(true)}
          onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
          placeholder="e.g. amul butter 500g  or  I want to buy 1 dozen bananas"
          className="flex-1 bg-transparent outline-none text-white placeholder-white/20 text-base"
          autoComplete="off"
        />
        {loading ? (
          <div className="w-5 h-5 border-2 border-violet-400/40 border-t-violet-400 rounded-full animate-spin flex-shrink-0" />
        ) : (
          <button type="submit" className="flex-shrink-0 bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold px-4 py-1.5 rounded-xl transition-colors">
            Compare
          </button>
        )}
      </div>

      {/* Suggestions dropdown */}
      {showSuggestions && query.length >= 2 && (
        <div className="absolute top-full left-0 right-0 mt-2 glass rounded-xl overflow-hidden z-50 shadow-2xl">
          <button
            type="button"
            onMouseDown={() => handleSelect(query)}
            className="suggest-item w-full text-left px-4 py-3 text-sm text-white/70 flex items-center gap-3 transition-colors border-b border-white/5"
          >
            <svg className="w-3.5 h-3.5 text-violet-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <span>Search for <span className="text-white font-semibold">"{query}"</span></span>
          </button>

          {suggestions.length > 0 && (
            <>
              <div className="px-4 py-1.5 text-[10px] text-white/25 uppercase tracking-widest">
                Exact match from history
              </div>
              {suggestions.map((s, i) => (
                <button
                  key={s}
                  type="button"
                  onMouseDown={() => handleSelect(s)}
                  className={`suggest-item w-full text-left px-4 py-2.5 text-sm text-white/80 flex items-center gap-3 transition-colors ${i + 1 === selectedIdx ? 'bg-violet-500/20' : ''}`}
                >
                  <svg className="w-3.5 h-3.5 text-white/20 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  <span dangerouslySetInnerHTML={{
                    __html: s.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'),
                      '<mark class="bg-violet-500/30 text-violet-300 rounded px-0.5">$1</mark>')
                  }} />
                </button>
              ))}
            </>
          )}
        </div>
      )}
    </form>
  );
}

/* ── App ── */
function App() {
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [lastQuery, setLastQuery] = useState('');

  // Cart state: [{id, query, addedProduct, blinkit: product|null, zepto: product|null}]
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);

  const cartQuerySet = new Set(cart.map(e => e.query.toLowerCase().trim()));
  const currentQueryInCart = lastQuery && cartQuerySet.has(lastQuery.toLowerCase().trim());
  const currentCartEntry =
    lastQuery && cart.find(e => e.query.toLowerCase().trim() === lastQuery.toLowerCase().trim());

  const getCheapestInStock = (platformResult) => {
    if (!platformResult || platformResult.status === 'error') return null;
    const inStock = (platformResult.products || []).filter(p => p.in_stock);
    if (!inStock.length) return null;
    return inStock.reduce((a, b) => a.price < b.price ? a : b);
  };

  const addToCart = (specificProduct = null) => {
    if (!results || !lastQuery) return;
    const queryKey = lastQuery.toLowerCase().trim();
    if (cartQuerySet.has(queryKey)) return;  // already in cart

    const blinkitCheapest = getCheapestInStock(results.results?.blinkit);
    const zeptoCheapest = getCheapestInStock(results.results?.zepto);

    let blinkit = blinkitCheapest;
    let zepto = zeptoCheapest;
    if (specificProduct) {
      const pl = specificProduct.platform;
      if (pl === 'blinkit') {
        blinkit = specificProduct;
        zepto = zeptoCheapest;
      } else if (pl === 'zepto') {
        zepto = specificProduct;
        blinkit = blinkitCheapest;
      }
    }

    const entry = {
      id: Date.now(),
      query: lastQuery,
      addedProduct: specificProduct,
      blinkit,
      zepto,
    };

    setCart(prev => [...prev, entry]);
    setCartOpen(true);
  };

  const removeFromCart = (id) => {
    setCart(prev => prev.filter(e => e.id !== id));
  };

  const clearCart = () => setCart([]);

  const handleSearch = async (query) => {
    setLoading(true);
    setError(null);
    setLastQuery(query);
    try {
      const res = await fetch(`${API}/smart-search?q=${encodeURIComponent(query)}&platforms=blinkit,zepto`);
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      setResults(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const totalResults = results
    ? Object.values(results.results).reduce((sum, r) => sum + (r.products?.length || 0), 0)
    : 0;

  const cartTotal = cart.length;

  return (
    <div className="min-h-screen flex flex-col">
      {/* Background blobs */}
      <div className="fixed inset-0 overflow-hidden pointer-events-none">
        <div className="absolute -top-40 -left-40 w-96 h-96 bg-violet-600/10 rounded-full blur-3xl" />
        <div className="absolute -bottom-40 -right-40 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl" />
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[300px] bg-emerald-600/5 rounded-full blur-3xl" />
      </div>

      {/* Cart Drawer */}
      <CartDrawer
        cart={cart}
        onRemove={removeFromCart}
        onClear={clearCart}
        onClose={() => setCartOpen(false)}
        isOpen={cartOpen}
      />

      <div className="relative z-10 flex flex-col min-h-screen">
        {/* Header */}
        <header className="text-center pt-12 pb-8 px-4">
          <div className="flex items-center justify-center gap-4 mb-6">
            <div className="inline-flex items-center gap-2 glass px-4 py-1.5 rounded-full text-xs text-white/40">
              <span className="pulse-dot w-1.5 h-1.5 bg-emerald-400 rounded-full inline-block" />
              Live prices from Blinkit · Zepto
            </div>

            {/* Cart button in header */}
            <button
              onClick={() => setCartOpen(true)}
              className="relative glass px-3 py-1.5 rounded-full text-xs text-white/50 hover:text-white/80 flex items-center gap-1.5 transition-all hover:bg-white/5"
            >
              <span>🛒</span>
              <span>Basket</span>
              {cartTotal > 0 && (
                <span className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-violet-600 text-white text-[10px] font-bold flex items-center justify-center">
                  {cartTotal}
                </span>
              )}
            </button>
          </div>

          <h1 className="text-5xl font-extrabold tracking-tight mb-3">
            <span className="gradient-text">Quick Compare</span>
          </h1>
          <p className="text-white/40 text-lg">Find the cheapest price across all quick commerce apps</p>
        </header>

        {/* Search */}
        <div className="px-4 pb-8">
          <SearchBar onSearch={handleSearch} loading={loading} />
        </div>

        {/* Error */}
        {error && (
          <div className="mx-4 mb-6 glass rounded-xl px-5 py-3 text-red-400 text-sm text-center">
            {error}
          </div>
        )}

        {/* Results */}
        {(results || loading) && (
          <main className="flex-1 px-4 pb-12 space-y-4 max-w-7xl mx-auto w-full">
            {/* Summary */}
            {results && !loading && (
              <div className="space-y-2">
                <div className="flex items-center justify-between px-1">
                  <p className="text-white/40 text-sm">
                    {totalResults} results for <span className="text-white/70 font-medium">"{lastQuery}"</span>
                  </p>
                  <button
                    onClick={() => { setResults(null); setLastQuery(''); }}
                    className="text-xs text-white/20 hover:text-white/50 transition-colors"
                  >
                    Clear
                  </button>
                </div>
                <SummaryBar
                  results={results.results}
                  cheapest={results.cheapest}
                  summary={results.summary}
                  onAddAll={() => addToCart(null)}
                  currentQueryInCart={currentQueryInCart}
                />
              </div>
            )}

            {/* Platform columns */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto w-full">
              {ACTIVE_PLATFORMS.map(platform => (
                <PlatformColumn
                  key={platform}
                  platform={platform}
                  result={results?.results?.[platform]}
                  cheapestProduct={results?.cheapest}
                  loading={loading}
                  onAddToCart={(product) => addToCart(product)}
                  selectedProductOnPlatform={currentCartEntry?.[platform]}
                />
              ))}
            </div>

            {/* Cart CTA — shown when results are loaded and items are in cart */}
            {!loading && cart.length > 0 && (
              <div className="max-w-4xl mx-auto w-full">
                <button
                  onClick={() => setCartOpen(true)}
                  className="w-full glass rounded-2xl px-6 py-4 flex items-center justify-between hover:bg-white/5 transition-all group"
                >
                  <div className="flex items-center gap-3">
                    <span className="text-xl">🛒</span>
                    <div className="text-left">
                      <p className="text-sm font-semibold text-white">
                        {cart.length} {cart.length === 1 ? 'item' : 'items'} in your basket
                      </p>
                      <p className="text-xs text-white/40">Click to compare total basket cost</p>
                    </div>
                  </div>
                  <span className="text-white/30 group-hover:text-white/60 transition-colors text-sm">View →</span>
                </button>
              </div>
            )}
          </main>
        )}

        {/* Empty state */}
        {!results && !loading && (
          <div className="flex-1 flex items-center justify-center px-4 pb-20">
            <div className="text-center space-y-3">
              <div className="text-6xl">🛒</div>
              <p className="text-white/20 text-sm">Search for any grocery item to compare prices</p>
              <div className="flex flex-wrap justify-center gap-2 mt-4">
                {['amul butter', 'tata salt', 'fortune oil 1L', 'haldirams', 'maggi noodles'].map(q => (
                  <button
                    key={q}
                    onClick={() => handleSearch(q)}
                    className="glass px-3 py-1.5 rounded-full text-xs text-white/40 hover:text-white/70 hover:bg-white/5 transition-all"
                  >
                    {q}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Footer */}
        <footer className="text-center py-4 text-white/15 text-xs">
          Prices update every 30 min · For personal use only
        </footer>
      </div>

      {/* Floating cart button — shows when cart has items and drawer is closed */}
      {cartTotal > 0 && !cartOpen && (
        <button
          onClick={() => setCartOpen(true)}
          className="fixed bottom-6 right-6 z-30 flex items-center gap-2 bg-violet-600 hover:bg-violet-500 text-white font-semibold text-sm px-4 py-3 rounded-2xl shadow-2xl transition-all hover:scale-105 active:scale-95"
          style={{ boxShadow: '0 8px 32px rgba(139,92,246,0.5)' }}
        >
          <span>🛒</span>
          <span>{cartTotal} {cartTotal === 1 ? 'item' : 'items'}</span>
          <span className="text-violet-200/70">· View basket</span>
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
